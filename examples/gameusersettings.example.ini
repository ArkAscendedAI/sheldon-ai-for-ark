# Add this section to your ARK server's GameUserSettings.ini
# to configure the SheldonAI mod.

[SheldonAI]
# Connection to the Sheldon Bridge
WebSocketURL=wss://your-bridge-host:8443/sheldon
AuthSecret=your-generated-shared-secret
ServerName=My ARK Server

# UI Configuration
EnableUI=true
UIKeybind=F8

# Permission Defaults
DefaultTier=player
AdminTierFromGameAdmins=true

# Features
EnableEventNotifications=true
EnablePlayerWelcome=true
WelcomeMessage=Welcome! Press F8 to talk to Sheldon, your AI assistant.

# Per-player tier overrides (EOS ID = tier)
# [SheldonAI.Permissions]
# 00012345abcdef=superadmin
# 00067890fedcba=admin
